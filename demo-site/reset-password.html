<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <title>TurboFix — Reset Password</title>
  <link rel="stylesheet" href="assets/vault-dashboard.css">
</head>
<body>
<div class="container">
  <div class="screen">
    <div class="login-card">
      <h1>TurboFix</h1>

      <!-- Step 1: request a reset link (shown when there's no ?token= in the URL) -->
      <div id="requestStep">
        <p class="subtitle">Reset your password</p>
        <div class="form-group">
          <label for="email">Account email</label>
          <input type="email" id="email" placeholder="you@company.com" autocomplete="email">
        </div>
        <button id="requestBtn" class="btn-primary">Send reset link</button>
        <div id="requestMsg" class="error-msg"></div>
        <div class="footer-link"><a href="dashboard.html">← Back to sign in</a></div>
      </div>

      <!-- Step 2: choose a new password (shown when the URL carries a ?token=) -->
      <div id="resetStep" style="display:none;">
        <p class="subtitle">Choose a new password</p>
        <div class="form-group">
          <label for="newPassword">New password</label>
          <input type="password" id="newPassword" placeholder="at least 8 characters" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm new password</label>
          <input type="password" id="confirmPassword" placeholder="repeat it" autocomplete="new-password">
        </div>
        <button id="resetBtn" class="btn-primary">Set new password</button>
        <div id="resetMsg" class="error-msg"></div>
        <div class="footer-link"><a href="dashboard.html">← Back to sign in</a></div>
      </div>
    </div>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const BACKEND_URL = params.get("backend") || localStorage.getItem("dashboardBackend") || "https://turbofix-backend-ehxb.onrender.com";
const token = params.get("token");

const requestStep = document.getElementById("requestStep");
const resetStep = document.getElementById("resetStep");
const requestMsg = document.getElementById("requestMsg");
const resetMsg = document.getElementById("resetMsg");

if (token) {
  requestStep.style.display = "none";
  resetStep.style.display = "block";
}

async function requestReset() {
  const email = document.getElementById("email").value.trim();
  if (!email) { requestMsg.textContent = "Enter your account email."; return; }
  requestMsg.style.color = "";
  requestMsg.textContent = "Sending…";
  try {
    const resp = await fetch(`${BACKEND_URL}/auth/forgot-password`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({email}),
    });
    const data = await resp.json().catch(() => ({}));
    // The backend always responds the same way whether or not the email exists.
    requestMsg.style.color = "#16a34a";
    requestMsg.textContent = data.message || "If an account with that email exists, a reset link has been sent.";
  } catch (e) {
    requestMsg.style.color = "";
    requestMsg.textContent = "Error: " + e.message + " (check backend URL)";
  }
}

async function submitReset() {
  const pw = document.getElementById("newPassword").value;
  const confirm = document.getElementById("confirmPassword").value;
  if (pw.length < 8) { resetMsg.textContent = "Password must be at least 8 characters."; return; }
  if (pw !== confirm) { resetMsg.textContent = "The two passwords don't match."; return; }
  resetMsg.style.color = "";
  resetMsg.textContent = "Saving…";
  try {
    const resp = await fetch(`${BACKEND_URL}/auth/reset-password`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({token, new_password: pw}),
    });
    const data = await resp.json().catch(() => ({}));
    if (!resp.ok) {
      resetMsg.textContent = data.detail || "This reset link is invalid or has expired.";
      return;
    }
    resetStep.innerHTML =
      `<p class="subtitle">Password reset</p>
       <p style="color:#16a34a;margin:12px 0 20px;">${data.message || "Your password has been reset."}</p>
       <a href="dashboard.html" class="btn-primary" style="display:block;text-align:center;text-decoration:none;">Sign in</a>`;
  } catch (e) {
    resetMsg.textContent = "Error: " + e.message + " (check backend URL)";
  }
}

document.getElementById("requestBtn")?.addEventListener("click", requestReset);
document.getElementById("resetBtn")?.addEventListener("click", submitReset);
document.getElementById("confirmPassword")?.addEventListener("keypress", (e) => { if (e.key === "Enter") submitReset(); });
document.getElementById("email")?.addEventListener("keypress", (e) => { if (e.key === "Enter") requestReset(); });
</script>
</body>
</html>
