name: Deploy Backend to Railway

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'

jobs:
  test:
    name: pytest (pre-deploy gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r backend/requirements.txt
      - run: pytest backend/tests/ -q --tb=short
        env:
          TICKET_STORE: local
          TRACKER_XLSX_PATH: /tmp/test-tracker.xlsx
          DOCUMENT_STORE: local
          JWT_SECRET_KEY: test-secret-not-for-production
          PLATFORM_ADMIN_PASSWORD: test-admin-password

  deploy:
    name: Deploy to Railway
    needs: test          # only deploys if all tests pass
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        run: railway up --service turbofix-backend --detach
        working-directory: backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          # RAILWAY_TOKEN must be set in GitHub → Settings → Secrets → Actions.
          # Generate it at: https://railway.app/account/tokens
